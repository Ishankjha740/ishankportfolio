version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"

    open-pull-requests-limit: 10

    versioning-strategy: increase

    labels:
      - "dependencies"
      - "security"

    commit-message:
      prefix: "fix"
      include: "scope"

    groups:
      security-updates:
        applies-to: security-updates

      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

    allow:
      - dependency-type: "all"
