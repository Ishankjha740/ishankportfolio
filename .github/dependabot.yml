version: 2

updates:
  # 🔹 NPM (Frontend)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
      time: "04:00"

    # Keep queue tight
    open-pull-requests-limit: 5

    # Auto rebase → faster merges
    rebase-strategy: "auto"

    # Only meaningful updates
    allow:
      - dependency-type: "direct"

    # Clean commit messages
    commit-message:
      prefix: "deps"
      include: "scope"

    labels:
      - "dependencies"

    # Smart grouping
    groups:
      minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

      major:
        patterns:
          - "*"
        update-types:
          - "major"

  # 🔹 GitHub Actions (CI/CD)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"

    open-pull-requests-limit: 3
    rebase-strategy: "auto"

    commit-message:
      prefix: "ci"

    labels:
      - "ci"
      - "dependencies"

    groups:
      gha-updates:
        patterns:
          - "*"
