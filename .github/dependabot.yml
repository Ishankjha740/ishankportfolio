version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "daily"
      time: "11:00"
       allow:
         - dependency-type: "direct"

    open-pull-requests-limit: 5

    versioning-strategy: increase

    labels:
      - "dependencies"
      - "security"

    commit-message:
      prefix: "fix"
      include: "scope"

    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

      major-updates:
        patterns:
          - "*"
        update-types:
          - "major"
